---

- name: Configure chrony NTP client on compute node(s)
  hosts: compute_nodes
  become: yes

  vars:
    head_node_ip: "10.0.0.2"

  tasks:
    - name: Install chrony
      dnf:
        name: chrony
        state: present

    - name: Comment out existing pool/server declarations
      replace:
        path: /etc/chrony.conf
        regexp: '^(pool |server )'
        replace: '#\1'
      notify: restart chronyd

    - name: Point chrony at the head node
      lineinfile:
        path: /etc/chrony.conf
        regexp: "^server {{ head_node_ip }}"
        line: "server {{ head_node_ip }}"
        insertafter: EOF
      notify: restart chronyd

    - name: Enable and start chronyd
      systemd:
        name: chronyd
        enabled: yes
        state: started

  handlers:
    - name: restart chronyd
      systemd:
        name: chronyd
        state: restarted

  post_tasks:
    - name: Show NTP sources
      command: chronyc sources
      register: sources_output
      changed_when: false

    - name: Display NTP sources
      debug:
        var: sources_output.stdout_lines
